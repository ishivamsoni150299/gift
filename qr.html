<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print Gift QR</title>
    <style>
      :root {
        --ink: #25171b;
        --paper: #fff7f8;
        --wine: #5f1e32;
        --rose: #dc476b;
        --rose-light: #f58aa3;
        --gold: #efbd4d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 28px;
        background:
          linear-gradient(90deg, rgba(220, 71, 107, 0.07) 1px, transparent 1px) 0 0 / 36px 36px,
          linear-gradient(rgba(220, 71, 107, 0.07) 1px, transparent 1px) 0 0 / 36px 36px,
          var(--paper);
        color: var(--ink);
        font-family: Inter, system-ui, sans-serif;
      }

      .sheet {
        width: min(100%, 580px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, serif;
        color: var(--wine);
        font-size: clamp(2.5rem, 8vw, 4.8rem);
        line-height: 0.95;
      }

      p {
        margin: 0 auto 24px;
        max-width: 36rem;
        line-height: 1.6;
        color: rgba(37, 23, 27, 0.72);
      }

      label {
        display: block;
        margin-bottom: 8px;
        text-align: left;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 48px;
        padding: 0 14px;
        border: 1px solid rgba(95, 30, 50, 0.28);
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        border-radius: 999px;
        background: var(--rose);
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .heart-stage {
        position: relative;
        width: min(94vw, 500px);
        height: min(88vw, 460px);
        max-height: 460px;
        margin: 24px auto 4px;
        isolation: isolate;
      }

      .heart-shape {
        position: absolute;
        left: 50%;
        top: 52%;
        z-index: -1;
        width: min(58vw, 286px);
        height: min(58vw, 286px);
        border-radius: 32px 6px 32px 6px;
        background: linear-gradient(135deg, var(--rose-light), var(--rose) 62%, #b92f55);
        box-shadow: 0 28px 70px rgba(185, 47, 85, 0.3);
        transform: translate(-50%, -50%) rotate(-45deg);
      }

      .heart-shape::before,
      .heart-shape::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: inherit;
      }

      .heart-shape::before {
        top: -50%;
        left: 0;
      }

      .heart-shape::after {
        top: 0;
        left: 50%;
      }

      .heart-glow {
        position: absolute;
        left: 50%;
        top: 48%;
        z-index: -2;
        width: 88%;
        height: 76%;
        border-radius: 50%;
        background: rgba(245, 138, 163, 0.22);
        filter: blur(24px);
        transform: translate(-50%, -50%);
      }

      .qr {
        position: absolute;
        left: 50%;
        top: 49%;
        width: min(55vw, 264px);
        aspect-ratio: 1;
        padding: 14px;
        border-radius: 8px;
        background: white;
        border: 5px solid rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 46px rgba(95, 30, 50, 0.26);
        transform: translate(-50%, -50%);
      }

      .qr img {
        display: block;
        width: 100%;
        height: 100%;
      }

      .flower {
        position: absolute;
        z-index: 3;
        font-size: clamp(1.7rem, 6vw, 2.8rem);
        filter: drop-shadow(0 8px 12px rgba(95, 30, 50, 0.14));
      }

      .flower--one {
        left: 5%;
        top: 30%;
        transform: rotate(-14deg);
      }

      .flower--two {
        right: 3%;
        top: 24%;
        transform: rotate(12deg);
      }

      .flower--three {
        right: 14%;
        bottom: 10%;
      }

      .sparkle {
        position: absolute;
        left: 14%;
        bottom: 13%;
        z-index: 3;
        color: var(--gold);
        font-size: clamp(1.8rem, 7vw, 3.2rem);
      }

      .caption {
        color: var(--rose);
      }

      .caption strong,
      .caption span {
        display: block;
      }

      .caption strong {
        font-family: Georgia, serif;
        font-size: 1.8rem;
      }

      .caption span {
        margin-top: 4px;
        color: rgba(37, 23, 27, 0.58);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media print {
        body {
          background: white;
        }

        .controls,
        p {
          display: none;
        }

        .heart-stage {
          width: 500px;
          height: 460px;
        }
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <h1>A little surprise for Sneha 💖</h1>
      <p>This heart holds a tiny world made especially for Gudiya.</p>

      <div class="controls">
        <label for="url">Gift page URL</label>
        <input id="url" type="url" value="https://ishivamsoni150299.github.io/gift/for-sneha/" />
        <button type="button" id="make">Create QR code</button>
      </div>

      <div class="heart-stage">
        <div class="heart-glow" aria-hidden="true"></div>
        <div class="heart-shape" aria-hidden="true"></div>
        <span class="flower flower--one" aria-hidden="true">🌸</span>
        <span class="flower flower--two" aria-hidden="true">🌷</span>
        <span class="flower flower--three" aria-hidden="true">🌼</span>
        <span class="sparkle" aria-hidden="true">✨</span>
        <div class="qr" aria-live="polite">
          <img id="qr" alt="Colored QR code for Sneha's digital gift" />
        </div>
      </div>
      <div class="caption"><strong>For Sneha</strong><span>Scan with love · 17 July 2026</span></div>
    </main>

    <script>
      const input = document.querySelector("#url");
      const qr = document.querySelector("#qr");
      const make = document.querySelector("#make");

      function updateQr() {
        const value = input.value.trim() || "https://ishivamsoni150299.github.io/gift/for-sneha/";
        qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=720x720&color=5f1e32&bgcolor=ffffff&ecc=H&qzone=4&data=${encodeURIComponent(value)}`;
      }

      make.addEventListener("click", updateQr);
      input.addEventListener("input", updateQr);
      updateQr();
    </script>
  </body>
</html>
