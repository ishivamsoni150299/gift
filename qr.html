<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Print Gift QR</title>
    <style>
      :root {
        --ink: #25171b;
        --paper: #fff8f3;
        --wine: #5f1e32;
        --rose: #c84f6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 28px;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, system-ui, sans-serif;
      }

      .sheet {
        width: min(100%, 520px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-family: Georgia, serif;
        font-size: clamp(2.4rem, 8vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0 auto 24px;
        max-width: 36rem;
        line-height: 1.6;
        color: rgba(37, 23, 27, 0.72);
      }

      label {
        display: block;
        margin-bottom: 8px;
        text-align: left;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 48px;
        padding: 0 14px;
        border: 1px solid rgba(95, 30, 50, 0.28);
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        background: var(--wine);
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .qr {
        width: min(78vw, 320px);
        aspect-ratio: 1;
        margin: 34px auto 18px;
        padding: 18px;
        background: white;
        border: 1px solid rgba(95, 30, 50, 0.18);
      }

      .qr img {
        width: 100%;
        height: 100%;
      }

      .caption {
        color: var(--rose);
        font-weight: 800;
      }

      @media print {
        body {
          background: white;
        }

        .controls,
        p {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="sheet">
      <h1>Scan to open your gift</h1>
      <p>Paste the final hosted gift URL below, create the QR, then print this page for the gift box.</p>

      <div class="controls">
        <label for="url">Gift page URL</label>
        <input id="url" type="url" value="https://ishivamsoni150299.github.io/gift/for-sneha/" />
        <button type="button" id="make">Create QR code</button>
      </div>

      <div class="qr" aria-live="polite">
        <img id="qr" alt="QR code for the digital gift" />
      </div>
      <div class="caption">17 July 2026</div>
    </main>

    <script>
      const input = document.querySelector("#url");
      const qr = document.querySelector("#qr");
      const make = document.querySelector("#make");

      function updateQr() {
        const value = input.value.trim() || "https://ishivamsoni150299.github.io/gift/for-sneha/";
        qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=720x720&data=${encodeURIComponent(value)}`;
      }

      make.addEventListener("click", updateQr);
      input.addEventListener("input", updateQr);
      updateQr();
    </script>
  </body>
</html>
